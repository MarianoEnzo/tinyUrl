services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/tinyurl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - path: .env
        required: false
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
