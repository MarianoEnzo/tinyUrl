<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TinyURL — Groobyte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:      #3730A3;
      --purple-mid:  #4338CA;
      --purple-light:#5B51D8;
      --teal:        #14B8A6;
      --teal-light:  #2DD4BF;
      --teal-dim:    rgba(20, 184, 166, 0.15);
      --white:       #ffffff;
      --bg:          #F0FAFA;
      --text-1:      #1F2937;
      --text-2:      #4B5563;
      --text-3:      #9CA3AF;
      --border:      #E5E7EB;
      --red:         #EF4444;
      --red-dim:     rgba(239, 68, 68, 0.08);
      --shadow-sm:   0 2px 8px rgba(55, 48, 163, 0.08);
      --shadow-md:   0 8px 32px rgba(55, 48, 163, 0.12);
    }

    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Navbar ──────────────────────────────────────────────────────── */
    .navbar {
      background: var(--purple);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand-groo {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
      font-style: italic;
    }

    .brand-byte {
      font-size: 0.625rem;
      font-weight: 700;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.7);
      padding: 2px 4px;
      letter-spacing: 0.1em;
      border-radius: 2px;
      align-self: flex-start;
      margin-top: 4px;
    }

    .navbar-pill {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 6px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* ─── Hero ────────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      background: var(--teal);
      overflow: hidden;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* organic blob shapes — pure CSS, no images */
    .hero::before,
    .hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      pointer-events: none;
    }

    .hero::before {
      width: 600px;
      height: 600px;
      background: var(--teal-light);
      top: -200px;
      right: -150px;
    }

    .hero::after {
      width: 400px;
      height: 400px;
      background: #0d9488;
      bottom: -150px;
      left: -100px;
    }

    .hero-blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.25;
      pointer-events: none;
      width: 350px;
      height: 350px;
      background: var(--teal-light);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
    }

    .hero-title {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .hero-heading {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.15;
      text-decoration: underline;
      text-underline-offset: 5px;
      margin-bottom: 20px;
    }

    /* ─── Cards container ─────────────────────────────────────────────── */
    .cards-area {
      position: relative;
      z-index: 2;
      max-width: 560px;
      width: 100%;
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Card ────────────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 28px;
      box-shadow: var(--shadow-md);
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .card-divider {
      width: 40px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
      margin-bottom: 20px;
    }

    /* ─── Form ────────────────────────────────────────────────────────── */
    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    input {
      display: block;
      width: 100%;
      height: 44px;
      background: #FAFAFA;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-1);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0 14px;
      outline: none;
      transition: border-color 150ms, box-shadow 150ms;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-dim);
      background: #fff;
    }

    input::placeholder {
      color: var(--text-3);
      font-weight: 400;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-3);
      font-weight: 500;
      margin-top: 5px;
    }

    /* ─── Button ──────────────────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 8px;
      font: 700 0.9rem/1 inherit;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 150ms, box-shadow 150ms, transform 100ms, opacity 150ms;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .btn:active:not(:disabled) { transform: scale(0.975); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-purple {
      background: var(--purple);
      color: #fff;
    }

    .btn-purple:hover:not(:disabled) {
      background: var(--purple-mid);
      box-shadow: 0 6px 20px rgba(55, 48, 163, 0.35);
    }

    /* ─── Spinner ─────────────────────────────────────────────────────── */
    .spin {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rotate 0.65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes rotate { to { transform: rotate(360deg); } }

    /* ─── Alerts ──────────────────────────────────────────────────────── */
    .alert {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: 1.5;
      margin-top: 14px;
      display: none;
    }

    .alert.show { display: block; }

    .alert-error {
      background: var(--red-dim);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--red);
    }

    /* ─── Result ──────────────────────────────────────────────────────── */
    .result {
      background: var(--teal-dim);
      border: 1.5px solid rgba(20, 184, 166, 0.3);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .result.show { display: flex; }

    .result-link {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--teal);
      word-break: break-all;
      text-decoration: none;
    }

    .result-link:hover { text-decoration: underline; }

    .copy-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-3);
      transition: background 150ms, color 150ms, border-color 150ms;
      position: relative;
    }

    .copy-btn:hover {
      background: var(--teal-dim);
      color: var(--teal);
      border-color: var(--teal);
    }

    .copy-btn.copied {
      color: var(--teal);
      border-color: var(--teal);
      background: var(--teal-dim);
    }

    .copy-tip {
      position: absolute;
      bottom: calc(100% + 7px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-1);
      color: #fff;
      font: 600 0.6875rem/1 inherit;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 150ms;
    }

    .copy-tip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--text-1);
    }

    .copy-btn.copied .copy-tip { opacity: 1; }

    /* ─── Stats grid ──────────────────────────────────────────────────── */
    .stats-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .stats-grid.show { display: grid; }

    .stat {
      background: #F9FAFB;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-name {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    .stat-num {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--purple);
      line-height: 1;
    }

    .stat-date {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      line-height: 1.4;
    }

    /* ─── Footer / White section ──────────────────────────────────────── */
    .footer-section {
      background: #fff;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      /* diagonal stripe pattern like Groobyte's white sections */
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        rgba(55, 48, 163, 0.03) 18px,
        rgba(55, 48, 163, 0.03) 19px
      );
    }

    .stack-badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
    }

    /* ─── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .navbar { padding: 0 16px; }
      .hero { padding: 40px 16px 60px; }
      .hero-heading { font-size: 1.5rem; }
      .card { padding: 20px; }
      .stats-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ─── Navbar ─── -->
  <nav class="navbar">
    <a href="/" class="navbar-brand" aria-label="TinyURL por Groobyte">
      <span class="brand-groo">groo</span>
      <span class="brand-byte">BYTE</span>
    </a>
    <span class="navbar-pill">TinyURL</span>
  </nav>

  <!-- ─── Hero + Cards ─── -->
  <section class="hero">
    <div class="hero-blob" aria-hidden="true"></div>


    <!-- Cards live inside the hero, same as Groobyte's content-on-teal pattern -->
    <div class="cards-area">

      <!-- Shorten Card -->
      <div class="card">
        <p class="card-title">Acortar URL</p>
        <div class="card-divider"></div>

        <form id="shortenForm" novalidate>
          <div class="field">
            <label for="originalUrl">
              URL larga <span aria-hidden="true" style="color:var(--red)">*</span>
            </label>
            <input
              id="originalUrl"
              type="url"
              placeholder="https://tu-url-muy-larga.com/alguna/ruta"
              autocomplete="url"
              required
            />
          </div>

          <div class="field">
            <label for="alias">
              Alias personalizado <span style="color:var(--text-3);font-weight:400">(opcional)</span>
            </label>
            <input
              id="alias"
              type="text"
              placeholder="mi-link"
              minlength="3"
              maxlength="10"
              pattern="[a-zA-Z0-9\-]+"
              autocomplete="off"
              spellcheck="false"
            />
            <p class="hint">3–10 caracteres · solo letras, números y guiones</p>
          </div>

          <button type="submit" class="btn btn-purple" id="shortenBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            Acortar
          </button>

          <div class="alert alert-error" id="shortenErr" role="alert" aria-live="polite"></div>

          <div class="result" id="result" role="region" aria-label="URL acortada">
            <a class="result-link" id="resultLink" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button type="button" class="copy-btn" id="copyBtn" aria-label="Copiar link">
              <svg id="copyIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span class="copy-tip" aria-hidden="true">¡Copiado!</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Stats Card -->
      <div class="card">
        <p class="card-title">Estadísticas</p>
        <div class="card-divider"></div>

        <form id="statsForm" novalidate>
          <div class="field">
            <label for="statsCode">
              Código corto <span aria-hidden="true" style="color:var(--red)">*</span>
            </label>
            <input
              id="statsCode"
              type="text"
              placeholder="abc123"
              required
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <button type="submit" class="btn btn-purple" id="statsBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            Ver estadísticas
          </button>

          <div class="alert alert-error" id="statsErr" role="alert" aria-live="polite"></div>

          <div class="stats-grid" id="statsGrid">
            <div class="stat">
              <div class="stat-name">Total de clics</div>
              <div class="stat-num" id="statClicks"></div>
            </div>
            <div class="stat">
              <div class="stat-name">Último clic</div>
              <div class="stat-date" id="statDate"></div>
            </div>
          </div>
        </form>
      </div>

    </div><!-- /cards-area -->
  </section>

  <!-- ─── Footer ─── -->
  <div class="footer-section">

    <div class="stack-badges" role="list" aria-label="Tech stack">
      <span >Stack  </span>
      <span class="badge" role="listitem">NestJS</span>
      <span class="badge" role="listitem">MongoDB</span>
      <span class="badge" role="listitem">Redis</span>
      <span class="badge" role="listitem">BullMQ</span>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    const SHORTEN_CONTENT = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg> Acortar`;

    const STATS_CONTENT = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg> Ver estadísticas`;

    const COPY_ICON = `<svg id="copyIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>`;

    const CHECK_ICON = `<svg id="copyIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="20 6 9 17 4 12"/>
    </svg>`;

    function setLoading(btn, on, defaultHTML) {
      btn.disabled = on;
      btn.innerHTML = on ? '<div class="spin"></div> Loading…' : defaultHTML;
    }

    function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }
    function hideErr(el)      { el.classList.remove('show'); }

    function parseApiError(data) {
      if (!data) return 'Ocurrió un error inesperado.';
      if (Array.isArray(data.message)) return data.message.join(' · ');
      return data.message || 'Ocurrió un error inesperado.';
    }

    // Shorten
    $('shortenForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const originalUrl = $('originalUrl').value.trim();
      const alias       = $('alias').value.trim();

      hideErr($('shortenErr'));
      $('result').classList.remove('show');

      if (!originalUrl) {
        showErr($('shortenErr'), 'Por favor ingresá una URL.');
        $('originalUrl').focus();
        return;
      }

      const btn = $('shortenBtn');
      setLoading(btn, true, SHORTEN_CONTENT);

      try {
        const body = { originalUrl };
        if (alias) body.alias = alias;

        const res  = await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(parseApiError(data));

        const shortUrl = `${location.origin}/${data.code}`;
        $('resultLink').href        = shortUrl;
        $('resultLink').textContent = shortUrl;
        $('result').classList.add('show');

      } catch (err) {
        showErr($('shortenErr'), err.message);
      } finally {
        setLoading(btn, false, SHORTEN_CONTENT);
      }
    });

    // Copy
    $('copyBtn').addEventListener('click', async () => {
      const url = $('resultLink').href;
      const btn = $('copyBtn');

      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = Object.assign(document.createElement('textarea'), {
          value: url,
          style: 'position:fixed;opacity:0;pointer-events:none',
        });
        document.body.append(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }

      btn.classList.add('copied');
      btn.setAttribute('aria-label', '¡Copiado!');
      $('copyIcon').outerHTML = CHECK_ICON;

      setTimeout(() => {
        btn.classList.remove('copied');
        btn.setAttribute('aria-label', 'Copiar link');
        $('copyIcon').outerHTML = COPY_ICON;
      }, 2000);
    });

    // Stats
    $('statsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = $('statsCode').value.trim();

      hideErr($('statsErr'));
      $('statsGrid').classList.remove('show');

      if (!code) {
        showErr($('statsErr'), 'Por favor ingresá un código corto.');
        $('statsCode').focus();
        return;
      }

      const btn = $('statsBtn');
      setLoading(btn, true, STATS_CONTENT);

      try {
        const res  = await fetch(`/api/stats/${encodeURIComponent(code)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(parseApiError(data));

        $('statClicks').textContent = data.totalClicks.toLocaleString();
        $('statDate').textContent   = data.lastClick
          ? new Date(data.lastClick).toLocaleString('en-US', {
              month: 'short', day: 'numeric', year: 'numeric',
              hour: '2-digit', minute: '2-digit',
            })
          : 'Sin clics aún';

        $('statsGrid').classList.add('show');

      } catch (err) {
        showErr($('statsErr'), err.message);
      } finally {
        setLoading(btn, false, STATS_CONTENT);
      }
    });
  </script>
</body>
</html>
